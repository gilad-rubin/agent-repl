name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd extension && npm ci
      - run: cd extension && npx @vscode/vsce package --allow-missing-repository
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: extension/*.vsix

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run pytest tests/

  release:
    needs: [build-extension, build-cli, test-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: vsix, path: artifacts/ }
      - uses: actions/download-artifact@v4
        with: { name: python-dist, path: artifacts/ }
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-pypi:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: python-dist, path: dist/ }
      - uses: astral-sh/setup-uv@v6
      - run: uv publish --trusted-publishing always
